name: go-arch-lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  arch-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run go-arch-lint
        uses: fe3dback/go-arch-lint@v1
        with:
          version: 'latest'
          args: 'check'
